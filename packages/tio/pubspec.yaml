name: tio
version: 0.8.0
repository: https://github.com/urusai88/tio

description: |
  A simple wrapper for dio with response typing and full backward compatibility.
  Inspired by chopper.

topics:
  - dio
  - api
  - client
  - rest

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  logging: ^1.0.0
  dio: ^5.0.0
  json_annotation: ^4.9.0
  meta: '>=1.3.0 <2.0.0'

dev_dependencies:
  lints: any
  test: ^1.5.0
  equatable: ^2.0.0
  collection: any
  build_runner: ^2.4.0
  json_serializable: ^6.8.0